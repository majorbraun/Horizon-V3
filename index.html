<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Nova</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <aside class="sidebar">

        <div class="logo">
            <h1>HORIZON</h1>
        </div>

        <button class="nav-btn active" data-page="home">
            Home
        </button>

        <button class="nav-btn" data-page="favorites">
            Favorites
        </button>

        <button class="nav-btn" data-page="recent">
            Recent
        </button>

        <button class="nav-btn" data-page="settings">
            Settings
        </button>

    </aside>

    <main>

        <header>

            <input
                id="search"
                type="text"
                placeholder="Search games..."
            >

        </header>

        <!-- HOME -->

        <section
            id="homePage"
            class="page active-page"
        >

            <h2>Categories</h2>

            <div id="categories"></div>

            <h2>Featured Games</h2>

            <div
                id="featuredGames"
                class="featured-grid"
            ></div>

            <h2>All Games</h2>

            <div
                id="gamesContainer"
                class="games-grid"
            ></div>

        </section>

        <!-- FAVORITES -->

        <section
            id="favoritesPage"
            class="page"
        >

            <h2>Favorites</h2>

            <div
                id="favoritesContainer"
                class="games-grid"
            ></div>

        </section>

        <!-- RECENT -->

        <section
            id="recentPage"
            class="page"
        >

            <h2>Recently Played</h2>

            <div
                id="recentContainer"
                class="games-grid"
            ></div>

        </section>

        <!-- SETTINGS -->

        <section
            id="settingsPage"
            class="page"
        >

            <div class="settings-card">

                <h2>Settings</h2>

                <p>
                    Future settings will appear here.
                </p>

            </div>

        </section>

    </main>

    <!-- GAME PLAYER -->

    <div id="playerOverlay">

        <div class="player-top">

            <button id="closePlayer">
                Close
            </button>

            <button id="fullscreenBtn">
                Fullscreen
            </button>

        </div>

        <iframe
            id="gameFrame"
            allowfullscreen
        ></iframe>

    </div>

    <script src="script.js"></script>

</body>

</html>
