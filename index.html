<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="background"></div>

<!-- Sidebar -->
<aside class="sidebar">

    <div class="logo">
        <h1>🌌 Horizon</h1>
    </div>

    <nav>
        <button class="nav-btn active" data-page="home">
            🏠 Home
        </button>

        <button class="nav-btn" data-page="favorites">
            ⭐ Favorites
        </button>

        <button class="nav-btn" data-page="recent">
            🕒 Recent
        </button>

        <button class="nav-btn" data-page="requests">
            📝 Requests
        </button>

        <button class="nav-btn" data-page="settings">
            ⚙️ Settings
        </button>

        <button class="nav-btn" data-page="admin">
            🔧 Admin
        </button>
    </nav>

</aside>

<!-- Main Content -->
<main>

    <header>

        <div class="header-top">

            <h2>Explore Games</h2>

            <div class="header-actions">

                <button id="themeToggle">
                    Theme
                </button>

            </div>

        </div>

        <input
            type="text"
            id="search"
            placeholder="Search games..."
        >

    </header>

    <!-- HOME PAGE -->
    <section id="homePage" class="page active-page">

        <div class="featured">

            <h3>Featured Games</h3>

            <div id="featuredGames" class="featured-grid"></div>

        </div>

        <div class="categories">

            <h3>Categories</h3>

            <div id="categories"></div>

        </div>

        <div>

            <h3>All Games</h3>

            <div id="gamesContainer" class="games-grid"></div>

        </div>

    </section>

    <!-- FAVORITES -->
    <section id="favoritesPage" class="page">

        <h2>Favorites</h2>

        <div id="favoritesContainer"
             class="games-grid"></div>

    </section>

    <!-- RECENT -->
    <section id="recentPage" class="page">

        <h2>Recently Played</h2>

        <div id="recentContainer"
             class="games-grid"></div>

    </section>

    <!-- REQUESTS -->
    <section id="requestsPage" class="page">

        <h2>Request A Game</h2>

        <form id="requestForm">

            <input
                type="text"
                id="requestName"
                placeholder="Game Name"
                required
            >

            <textarea
                id="requestReason"
                placeholder="Why should we add it?"
            ></textarea>

            <button type="submit">
                Submit Request
            </button>

        </form>

        <div id="requestList"></div>

    </section>

    <!-- SETTINGS -->
    <section id="settingsPage" class="page">

        <h2>Settings</h2>

        <div class="settings-card">

            <label>
                Theme
            </label>

            <select id="themeSelect">

                <option value="dark">
                    Dark
                </option>

                <option value="light">
                    Light
                </option>

                <option value="midnight">
                    Midnight
                </option>

            </select>

        </div>

    </section>

    <!-- ADMIN -->
    <section id="adminPage" class="page">

        <h2>Admin Panel</h2>

        <form id="adminForm">

            <input
                type="text"
                id="gameName"
                placeholder="Game Name"
                required
            >

            <input
                type="text"
                id="gameCategory"
                placeholder="Category"
                required
            >

            <input
                type="text"
                id="gameImage"
                placeholder="Thumbnail URL"
                required
            >

            <input
                type="text"
                id="gameUrl"
                placeholder="Game URL"
                required
            >

            <button type="submit">
                Add Game
            </button>

        </form>

        <div id="adminGames"></div>

    </section>

</main>

<!-- Game Player -->
<div id="playerOverlay">

    <div class="player-top">

        <button id="closePlayer">
            ✕ Close
        </button>

        <button id="fullscreenBtn">
            ⛶ Fullscreen
        </button>

    </div>

    <iframe
        id="gameFrame"
        allowfullscreen>
    </iframe>

</div>

<script src="script.js"></script>

</body>
</html>
